<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACEL CUP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--nav:#163949;--nav2:#224b5d;--green:#173f31;--green2:#245746;--gold:#c7a35b;--paper:#f5f0e4;--paper2:#fbf8f1;--line:#d7c59f;--ink:#24342d;--muted:#6d6a62;--red:#9a2b2b;--shadow:0 12px 28px rgba(33,33,24,.12)}
    body{margin:0;background:var(--paper);color:var(--ink)}
    nav.container-fluid{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--nav2),var(--nav));border-bottom:3px solid var(--gold);padding:.55rem 1.4rem}
    .font-normal{font-weight:normal}nav strong{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:2.05rem;letter-spacing:.02em;font-weight:700}
    nav a{color:#f6f2e8!important;font-weight:700;text-decoration:none}
    nav [role=button]{background:transparent;border:1px solid rgba(255,255,255,.34);color:#f6f2e8;padding:.45rem .95rem;border-radius:2px}
    main.container{max-width:1520px;padding-top:0;padding-bottom:1.5rem}
    .hero-shell{background:#e7deca;border-bottom:1px solid rgba(199,163,91,.35)}
    .hero-img{width:100%;display:block;aspect-ratio:16/5;object-fit:cover}
    .content-wrap{padding:14px 14px 0}.layout{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
    .cream-card{background:linear-gradient(180deg,#fbf8f1,#f3eadb);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:0;display:grid;grid-template-columns:57% 43%;grid-template-rows:1fr auto;grid-template-areas:"left trophy" "strip strip";overflow:hidden;min-height:240px}.card-left{grid-area:left;padding:18px 12px 18px 18px;display:flex;flex-direction:column;justify-content:flex-start}.panel-title{font-family:Georgia,'Times New Roman',serif;font-size:1.45rem;color:var(--green);margin:0 0 4px}.panel-title::after{content:"≈ ≈ ≈";display:block;font-size:.7rem;color:var(--gold);letter-spacing:4px;margin-top:5px;margin-bottom:8px}.fine-rule{height:1px;background:rgba(199,163,91,.35);margin:10px 0 12px}
    .winner-wrap{display:block}.winner-copy .month{font-size:1rem;color:var(--muted);margin-bottom:4px}.winner-copy .name{font-family:Georgia,'Times New Roman',serif;font-size:1.55rem;font-weight:700;color:#163d2f;margin:.4rem 0 .3rem}.winner-copy .score{font-size:1rem;color:var(--ink)}
    .trophy-art{grid-area:trophy;border:none;background:transparent;display:flex;align-items:center;justify-content:center;padding:8px 8px 8px 0;font-size:140px;line-height:1;filter:drop-shadow(2px 8px 18px rgba(0,0,0,.22))}
    .land-strip{grid-area:strip;height:160px;border:none;border-top:1px solid var(--line);background:url('https://images.unsplash.com/photo-1535131749006-b7f58c99034b?auto=format&fit=crop&w=1400&q=80') center/cover}
    .board-card{background:linear-gradient(180deg,#194c39,#1a4336);border:4px solid #255645;border-radius:4px;box-shadow:0 16px 28px rgba(21,52,38,.18)} .board-title{font-family:Georgia,'Times New Roman',serif;color:#f0d8a2;background:linear-gradient(180deg,#245f49,#184334);padding:14px 16px;border-bottom:2px solid var(--gold);font-size:1.3rem;font-style:italic;text-align:center}
    .masters-table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}.masters-table thead th{background:#1f5d47;color:#f8f4ea;padding:.72rem .65rem;border-bottom:1px solid rgba(255,255,255,.16);font-weight:700}.masters-table td{padding:.76rem .65rem;border-bottom:1px solid rgba(199,163,91,.22)}.masters-table tbody tr:nth-child(odd){background:#fffdfa}.masters-table tbody tr:nth-child(even){background:#f5eedf}.board-card .masters-table tbody tr:nth-child(odd){background:#fffdfa}.board-card .masters-table tbody tr:nth-child(even){background:#f3ebdc}
    .pos{font-family:Georgia,'Times New Roman',serif;font-weight:700;color:#173f31}.under{color:#216b49;font-weight:700}.over{color:var(--red);font-weight:700}.even{color:#8c6d31;font-weight:700}.muted{color:var(--muted)}
    .month-tabs{display:none}
    .triple{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-top:18px}.feature{background:#fffdf8;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:16px}.feature h4{font-family:Georgia,'Times New Roman',serif;color:#173f31;margin:0 0 8px}.rank-big{font-family:Georgia,'Times New Roman',serif;font-size:2rem;color:#173f31}
    .footer-band{margin-top:18px;background:linear-gradient(180deg,#234c3d,#17384a);color:#f2ede1;border-top:2px solid var(--gold);padding:16px;text-align:center}.footer-band a{color:#f2ede1;text-decoration:none;margin:0 10px;font-weight:600}
    @media (max-width:1180px){.layout,.triple{grid-template-columns:1fr}.winner-wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="container-fluid"><ul><li><strong class="font-normal"><span style="color:#E30613">ACEL</span> <span style="color:#020A3A">CUP</span></strong></li></ul><ul><li><a href="index.html">Leaderboard</a></li><li><a href="register.html">Registrer Runde</a></li><li><a href="admin.html">Admin Panel</a></li><li><a href="register.html#auth" role="button">Logg inn</a></li></ul></nav>
<main class="container"><div class="hero-shell"><img class="hero-img" src="herobilde.png" alt="ACEL CUP hero"></div><div class="content-wrap"><div class="layout"><article class="cream-card"><div class="card-left"><h3 class="panel-title">Månedsvinner</h3><div class="month-tabs" id="monthTabs"></div><div class="winner-copy" id="monthWinnerCard"></div></div><div class="trophy-art">🏆</div><div class="land-strip"></div></article><article class="board-card"><div class="board-title">Sammenlagt Leaderboard</div><div style="overflow:auto;"><table class="masters-table" id="seasonTable"><thead><tr><th>Pos</th><th>Spiller</th><th>Poeng</th><th>Netto</th></tr></thead><tbody></tbody></table></div></article></div><div class="triple"><article class="feature"><h4>Hole in one</h4><div id="acesList"></div></article><article class="feature"><h4>Beste hullresultater</h4><div style="overflow:auto;"><table class="masters-table" id="bestHolesTable"><thead><tr><th>Type</th><th>Spiller</th><th>Bane</th><th>Hull</th><th>Dato</th></tr></thead><tbody></tbody></table></div></article><article class="feature"><h4>Topp 3 birdies</h4><div id="birdieLeaders"></div></article></div></div><div class="footer-band"><a href="#">Regler</a> | <a href="#">Kontakt</a> | <a href="#">Personvern</a></div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://geduwhzlwdphouslxhsd.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_W8nt1u4S9htR3Zlz8-8SDA__cvNb_jG';
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const COURSE_ORDER=['Solnør GK','Giske GK','Volda GK','Sunnmøre GK','Rauma GK'];
const MONTH_NAMES=['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const POINTS_BY_RANK={1:500,2:400,3:350,4:300,5:250,6:200,7:150,8:100,9:50,10:50};
let selectedMonth=currentMonthKey();
const el={monthTabs:document.getElementById('monthTabs'),monthWinnerCard:document.getElementById('monthWinnerCard'),seasonTableBody:document.querySelector('#seasonTable tbody'),acesList:document.getElementById('acesList'),bestHolesTableBody:document.querySelector('#bestHolesTable tbody'),birdieLeaders:document.getElementById('birdieLeaders')};
function currentMonthKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function formatMonthKey(key){ const [y,m]=key.split('-'); return MONTH_NAMES[Number(m)-1]+' '+y; }
function formatDate(dateStr){ const [y,m,d]=dateStr.split('-'); return `${d}.${m}.${y}`; }
function scoreText(value){ return value<0?String(value):value>0?`+${value}`:'E'; }
function scoreHtml(value){ return value<0?`<span class="under">${value}</span>`:value>0?`<span class="over">+${value}</span>`:`<span class="even">E</span>`; }
function ordinalText(rank){ return `${rank}.`; }
function applyCompetitionRanking(list,scoreAccessor){ let rank=0,prevScore=null,seen=0; return list.map(item=>{ seen+=1; const score=scoreAccessor(item); if(prevScore===null||score!==prevScore){ rank=seen; prevScore=score; } return { ...item, rank }; }); }
function pointsForRank(rank){ return rank<=10?(POINTS_BY_RANK[rank]||20):20; }
function getMonthlyRanking(rounds,monthKey){ const filtered=rounds.filter(r=>r.month_key===monthKey).sort((a,b)=>a.score_relative-b.score_relative||a.net_total-b.net_total||a.date.localeCompare(b.date)||a.player_name.localeCompare(b.player_name,'no')); return applyCompetitionRanking(filtered,item=>item.score_relative); }
function getBestRoundsPerPlayerPerCourse(rounds){ const map=new Map(); for(const round of rounds){ const key=round.player_id+'__'+round.course; const current=map.get(key); if(!current||round.score_relative<current.score_relative||(round.score_relative===current.score_relative&&round.net_total<current.net_total)||(round.score_relative===current.score_relative&&round.net_total===current.net_total&&round.date<current.date)) map.set(key,round); } return [...map.values()]; }
function getCourseLeaderboard(rounds,course){ const bestRounds=getBestRoundsPerPlayerPerCourse(rounds).filter(r=>r.course===course).sort((a,b)=>a.score_relative-b.score_relative||a.net_total-b.net_total||a.date.localeCompare(b.date)||a.player_name.localeCompare(b.player_name,'no')); return applyCompetitionRanking(bestRounds,item=>item.score_relative).map(item=>({ ...item, points:pointsForRank(item.rank) })); }
function getSeasonLeaderboard(rounds){ const byPlayer=new Map(); for(const course of COURSE_ORDER){ for(const row of getCourseLeaderboard(rounds,course)){ const current=byPlayer.get(row.player_id)||{ player_id:row.player_id,player_name:row.player_name,points:0,countedCourses:0,bestScore:null }; current.points+=row.points; current.countedCourses+=1; if(current.bestScore===null||row.score_relative<current.bestScore) current.bestScore=row.score_relative; byPlayer.set(row.player_id,current); } } const rows=[...byPlayer.values()].sort((a,b)=>b.points-a.points||(a.bestScore??999)-(b.bestScore??999)||a.player_name.localeCompare(b.player_name,'no')); let rank=0,seen=0,prevPoints=null; return rows.map(row=>{ seen+=1; if(prevPoints===null||row.points!==prevPoints){ rank=seen; prevPoints=row.points; } return { ...row, rank }; }); }
function flattenHoleEvents(rounds){ const events=[]; for(const round of rounds){ const holes=Array.isArray(round.hole_breakdown)?round.hole_breakdown:[]; holes.forEach(h=>{ if(!h.played||!h.grossInput) return; const delta=h.grossInput-h.par; let type=null; if(h.grossInput===1) type='Hole in one'; else if(delta<=-3) type='Albatross'; else if(delta===-2) type='Eagle'; else if(delta===-1) type='Birdie'; if(type){ events.push({ type,player_name:round.player_name,course:round.course,hole:h.hole,date:round.date }); } }); } return events; }
function renderSpecialLists(rounds){ const events=flattenHoleEvents(rounds); const aces=events.filter(e=>e.type==='Hole in one').slice(0,3); el.acesList.innerHTML=aces.length?aces.map((e,i)=>`<div><strong>${i+1}. ${e.player_name}</strong><div class="muted">${e.course} • Hull ${e.hole} • ${formatDate(e.date)}</div></div>`).join('<div style="height:10px"></div>'):'<div class="muted">Ingen hole in one registrert ennå.</div>'; const bestTypes=events.filter(e=>['Albatross','Eagle','Birdie'].includes(e.type)).sort((a,b)=>({Albatross:1,Eagle:2,Birdie:3}[a.type]-({Albatross:1,Eagle:2,Birdie:3}[b.type])||b.date.localeCompare(a.date))).slice(0,5); el.bestHolesTableBody.innerHTML=bestTypes.length?bestTypes.map(e=>`<tr><td><strong>${e.type}</strong></td><td>${e.player_name}</td><td>${e.course}</td><td>${e.hole}</td><td>${formatDate(e.date)}</td></tr>`).join(''):'<tr><td colspan="5">Ingen birdies eller bedre registrert ennå.</td></tr>'; const birdieMap=new Map(); events.filter(e=>e.type==='Birdie').forEach(e=>birdieMap.set(e.player_name,(birdieMap.get(e.player_name)||0)+1)); const birdieRows=[...birdieMap.entries()].map(([player_name,count])=>({player_name,count})).sort((a,b)=>b.count-a.count||a.player_name.localeCompare(b.player_name,'no')).slice(0,3); el.birdieLeaders.innerHTML=birdieRows.length?birdieRows.map((r,i)=>`<div><strong>${i+1}. ${r.player_name}</strong><div class="rank-big">${r.count}</div><div class="muted">birdies</div></div>`).join('<div style="height:10px"></div>'):'<div class="muted">Ingen birdies registrert ennå.</div>'; }
function renderMonthTabs(rounds){ const monthKeys=[...new Set(rounds.map(r=>r.month_key))].sort(); const keys=monthKeys.length?monthKeys:[currentMonthKey()]; if(!keys.includes(selectedMonth)) selectedMonth=keys[keys.length-1]; el.monthTabs.innerHTML=''; keys.forEach(key=>{ const button=document.createElement('button'); button.type='button'; button.textContent=formatMonthKey(key); if(key===selectedMonth) button.classList.add('active'); button.addEventListener('click',()=>{ selectedMonth=key; renderMonthlyPanel(rounds); }); el.monthTabs.appendChild(button); }); }
function renderMonthlyPanel(rounds){ const ranking=getMonthlyRanking(rounds,selectedMonth); if(!ranking.length){ el.monthWinnerCard.innerHTML=`<div class="month">${formatMonthKey(selectedMonth)}</div><div class="fine-rule"></div><div class="muted">Ingen registrerte runder.</div>`; return; } const winner=ranking[0]; el.monthWinnerCard.innerHTML=`<div class="month">${formatMonthKey(selectedMonth)}</div><div class="fine-rule"></div><div class="name">1. ${winner.player_name}</div><div class="score"><strong>Netto:</strong> ${scoreText(winner.score_relative)} ${winner.course}</div>`; }
function renderSeasonTable(rounds){ const rows=getSeasonLeaderboard(rounds); el.seasonTableBody.innerHTML=rows.length?rows.map(row=>`<tr><td class="pos">${ordinalText(row.rank)}</td><td>${row.player_name}</td><td>${row.points}</td><td style="font-size:1.35rem;font-weight:700;">${row.bestScore==null?'—':scoreHtml(row.bestScore)}</td></tr>`).join(''):'<tr><td colspan="4">Ingen sesongdata ennå.</td></tr>'; }
async function init(){ const { data:rounds }=await supabaseClient.from('rounds').select('*').order('date',{ascending:false}); const all=rounds||[]; renderMonthTabs(all); renderMonthlyPanel(all); renderSeasonTable(all); renderSpecialLists(all); }
init();
</script>
</body>
</html>
