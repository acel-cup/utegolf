<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACEL CUP – Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--nav:#163949;--nav2:#224b5d;--green:#173f31;--gold:#c7a35b;--paper:#f5f0e4;--paper2:#fbf8f1;--line:#d7c59f;--ink:#24342d;--muted:#6d6a62;--shadow:0 12px 28px rgba(33,33,24,.12)}
    body{background:var(--paper);color:var(--ink)}nav.container-fluid{background:linear-gradient(180deg,var(--nav2),var(--nav));border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:50}.font-normal{font-weight:normal}nav strong{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:2rem;font-weight:700}nav a{color:#f6f2e8!important;font-weight:700}nav [role=button]{background:transparent;border:1px solid rgba(255,255,255,.34);color:#f6f2e8}.surface{background:linear-gradient(180deg,#fbf8f1,#f3eadb);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}main.container{max-width:1320px;padding-top:1.2rem;padding-bottom:2rem}.panel{padding:18px}.panel h2,.panel h3{font-family:Georgia,'Times New Roman',serif;color:var(--green)}.muted{color:var(--muted)}.controls{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:end}.masters-table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}.masters-table thead th{background:#1f5d47;color:#f8f4ea;padding:.72rem .65rem;border-bottom:1px solid rgba(255,255,255,.16);font-weight:700}.masters-table td{padding:.76rem .65rem;border-bottom:1px solid rgba(199,163,91,.22)}.masters-table tbody tr:nth-child(odd){background:#fffdfa}.masters-table tbody tr:nth-child(even){background:#f5eedf}.hidden{display:none!important}.toast{position:fixed;right:1rem;bottom:1rem;background:#173f31;color:#fff;padding:.85rem 1rem;border-radius:12px;opacity:0;transform:translateY(8px);transition:.2s;z-index:100}.toast.show{opacity:1;transform:translateY(0)}@media (max-width:900px){.controls{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="container-fluid"><ul><li><strong class="font-normal"><span style="color:#E30613">ACEL</span> <span style="color:#020A3A">CUP</span></strong></li></ul><ul><li><a href="index.html">Leaderboard</a></li><li><a href="register.html">Registrer Runde</a></li><li><a href="admin.html">Admin Panel</a></li><li><a href="#" role="button" id="logoutBtn">Logg ut</a></li></ul></nav>
<main class="container"><div class="grid"><section>
<article class="surface panel"><h2>Admin Panel</h2><p class="muted">Kun admin skal kunne se og bruke dette panelet. Her kan runder filtreres og slettes.</p><p id="adminStatus" class="muted">Sjekker admin-tilgang ...</p></article>
<article class="surface panel hidden" id="adminContent" style="margin-top:1rem;"><h3>Alle runder</h3><div class="controls"><label>Bane<select id="filterCourse"><option value="">Alle</option></select></label><label>Spiller<select id="filterPlayer"><option value="">Alle</option></select></label><label>Måned<select id="filterMonth"><option value="">Alle</option></select></label><label>Format<select id="filterFormat"><option value="">Alle</option><option value="full">Full 18</option><option value="front">Front 9</option><option value="back">Back 9</option></select></label><label>Sorter<select id="sortRounds"><option value="date-desc">Dato nyeste</option><option value="date-asc">Dato eldste</option><option value="score-asc">Beste score</option><option value="score-desc">Svakeste score</option><option value="player-asc">Spiller A–Å</option><option value="course-asc">Bane A–Å</option></select></label></div><div style="overflow:auto;margin-top:1rem;"><table class="masters-table" id="roundsTable"><thead><tr><th>Dato</th><th>Måned</th><th>Spiller</th><th>Markør</th><th>Bane</th><th>Tee</th><th>Format</th><th>HCP</th><th>PHCP</th><th>Brutto</th><th>Netto</th><th>Score</th><th>Handling</th></tr></thead><tbody></tbody></table></div></article>
</section></div></main>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://geduwhzlwdphouslxhsd.supabase.co'; const SUPABASE_ANON_KEY='sb_publishable_W8nt1u4S9htR3Zlz8-8SDA__cvNb_jG'; const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const COURSE_ORDER=['Solnør GK','Giske GK','Volda GK','Sunnmøre GK','Rauma GK']; const MONTH_NAMES=['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const state={players:[],rounds:[],isAdmin:false}; const el={logoutBtn:document.getElementById('logoutBtn'),adminStatus:document.getElementById('adminStatus'),adminContent:document.getElementById('adminContent'),filterCourse:document.getElementById('filterCourse'),filterPlayer:document.getElementById('filterPlayer'),filterMonth:document.getElementById('filterMonth'),filterFormat:document.getElementById('filterFormat'),sortRounds:document.getElementById('sortRounds'),roundsTableBody:document.querySelector('#roundsTable tbody'),toast:document.getElementById('toast')};
[el.filterCourse,el.filterPlayer,el.filterMonth,el.filterFormat,el.sortRounds].forEach(node=>node.addEventListener('change',renderRoundsTable));
function formatMonthKey(key){ const [y,m]=key.split('-'); return MONTH_NAMES[Number(m)-1]+' '+y; } function formatDate(dateStr){ const [y,m,d]=dateStr.split('-'); return `${d}.${m}.${y}`; } function scoreHtml(v){ return v<0?`<span style="color:#216b49;font-weight:700">${v}</span>`:v>0?`<span style="color:#9a2b2b;font-weight:700">+${v}</span>`:`<span style="color:#8c6d31;font-weight:700">E</span>`; }
function fillSelect(select,values,labelFn){ const current=select.value; select.innerHTML=values.map(v=>`<option value="${String(v).replaceAll('"','&quot;')}">${labelFn(v)}</option>`).join(''); if(values.includes(current)) select.value=current; }
async function init(){ const { data }=await supabaseClient.auth.getSession(); const user=data.session?.user; if(!user){ el.adminStatus.textContent='Du må logge inn først.'; return; } const { data:admin }=await supabaseClient.from('admin_users').select('user_id').eq('user_id',user.id).maybeSingle(); if(!admin){ el.adminStatus.textContent='Du er innlogget, men er ikke admin.'; return; } state.isAdmin=true; el.adminStatus.textContent='Admin-tilgang bekreftet.'; el.adminContent.classList.remove('hidden'); const { data:players }=await supabaseClient.from('players').select('*').order('name',{ascending:true}); state.players=players||[]; const { data:rounds }=await supabaseClient.from('rounds').select('*').order('date',{ascending:false}); state.rounds=rounds||[]; fillSelect(el.filterCourse,['',...COURSE_ORDER],v=>v||'Alle'); fillSelect(el.filterPlayer,['',...state.players.map(p=>String(p.id))],v=>!v?'Alle':(state.players.find(p=>String(p.id)===v)?.name||'Ukjent')); fillSelect(el.filterMonth,['',...[...new Set(state.rounds.map(r=>r.month_key))].sort()],v=>v?formatMonthKey(v):'Alle'); renderRoundsTable(); }
function renderRoundsTable(){ let rounds=[...state.rounds]; if(el.filterCourse.value) rounds=rounds.filter(r=>r.course===el.filterCourse.value); if(el.filterPlayer.value) rounds=rounds.filter(r=>String(r.player_id)===el.filterPlayer.value); if(el.filterMonth.value) rounds=rounds.filter(r=>r.month_key===el.filterMonth.value); if(el.filterFormat.value) rounds=rounds.filter(r=>r.format===el.filterFormat.value); const sort=el.sortRounds.value; rounds.sort((a,b)=>{ switch(sort){ case 'date-asc': return a.date.localeCompare(b.date); case 'score-asc': return a.score_relative-b.score_relative||a.date.localeCompare(b.date); case 'score-desc': return b.score_relative-a.score_relative||b.date.localeCompare(a.date); case 'player-asc': return a.player_name.localeCompare(b.player_name,'no'); case 'course-asc': return a.course.localeCompare(b.course,'no')||a.date.localeCompare(b.date); default: return b.date.localeCompare(a.date)||(b.created_at||'').localeCompare(a.created_at||''); }}); el.roundsTableBody.innerHTML=rounds.length?rounds.map(r=>`<tr><td>${formatDate(r.date)}</td><td>${formatMonthKey(r.month_key)}</td><td>${r.player_name}</td><td>${r.marker}</td><td>${r.course}</td><td>${r.tee}</td><td>${r.format==='front'?'Front 9':r.format==='back'?'Back 9':'18 Hull'}</td><td>${Number(r.handicap_index).toFixed(1)}</td><td>${r.playing_handicap}</td><td>${r.gross_total}</td><td>${r.net_total}</td><td>${scoreHtml(r.score_relative)}</td><td><button type="button" data-del="${r.id}" class="secondary">Slett</button></td></tr>`).join(''):'<tr><td colspan="13">Ingen runder matcher filtrene.</td></tr>'; document.querySelectorAll('[data-del]').forEach(btn=>btn.addEventListener('click',()=>deleteRound(btn.dataset.del))); }
async function deleteRound(roundId){ if(!confirm('Er du sikker på at du vil slette denne runden?')) return; const { error }=await supabaseClient.from('rounds').delete().eq('id',roundId); if(error){ showToast('Kunne ikke slette runden: '+error.message); return; } const { data:rounds }=await supabaseClient.from('rounds').select('*').order('date',{ascending:false}); state.rounds=rounds||[]; renderRoundsTable(); showToast('Runden er slettet.'); }
async function logout(){ await supabaseClient.auth.signOut(); showToast('Logget ut.'); }
function showToast(message){ el.toast.textContent=message; el.toast.classList.add('show'); clearTimeout(showToast._timer); showToast._timer=setTimeout(()=>el.toast.classList.remove('show'),2200); }
el.logoutBtn.addEventListener('click',async(e)=>{ e.preventDefault(); await logout(); }); init();
</script>
</body>
</html>
